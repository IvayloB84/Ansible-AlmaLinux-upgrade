---
- name: ELevate AlmaLinux 8 to 9 on Cloud VMs
  hosts: all
  become: true

  tasks:
    - name: 1. Force remove old corrupted repository files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/yum.repos.d/elevate.repo
        - /var/cache/dnf
        - /tmp/elevate-release.rpm

    - name: 2. Run a full system update to latest packages (Bypasses Python 3.6 conflict)
      ansible.builtin.shell: "yum update -y"
      register: dnf_update
      changed_when: "'Nothing to do' not in dnf_update.stdout"
      when: ansible_distribution_major_version == '8'

    - name: 3. Stage the network migration script
      ansible.builtin.copy:
        src: ./network_name_migration.sh
        dest: /tmp/network_name_migration.sh
        mode: "0755"

    - name: 4. Migrate legacy network interfaces to NetworkManager asynchronously
      ansible.builtin.shell: /bin/bash /tmp/network_name_migration.sh
      async: 120
      poll: 0
      register: network_migration_async

    - name: 5. Wait for the network connection to recover
      ansible.builtin.wait_for_connection:
        delay: 5
        timeout: 90

    - name: 6. Remove the temporary migration script
      ansible.builtin.file:
        path: /tmp/network_name_migration.sh
        state: absent

    - name: 7. Reboot if updates were installed
      ansible.builtin.reboot:
        reboot_timeout: 300
      when: dnf_update.changed

    - name: 8. Comment synced vagrant local project directory
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '^#?(\s*vagrant\s+/vagrant\s+vboxsf.*)'
        line: '#\1'
        backrefs: true
      register: fstab_change

    - name: 9. Unmount vboxsf filesystems if fstab changed
      ansible.posix.mount:
        path: /vagrant
        state: unmounted
      when: fstab_change.changed
      failed_when: false

    - name: 10. Install official ELevate repository for AlmaLinux 9
      ansible.builtin.shell: "dnf install -y http://repo.almalinux.org/elevate/elevate-release-latest-el$(rpm --eval %rhel).noarch.rpm"
      register: el8_repo
      when: ansible_distribution_major_version == '8'

    - name: 11. Install Leapp framework and AlmaLinux migration data
      ansible.builtin.shell: |
        dnf clean all
        rm -rf /var/cache/dnf
        yum install -y --allowerasing leapp-upgrade leapp-data-almalinux
      register: leapp_install
      when: ansible_distribution_major_version == '8'

    - name: 12. Fix Leapp Network Inhibitor by mapping predictable interface rules
      ansible.builtin.copy:
        dest: /etc/udev/rules.d/70-persistent-net.rules
        content: 'ACTION=="add", SUBSYSTEM=="net", ATTR{address}=="08:00:27:*", NAME="eth0"'
        mode: "0644"
      when: ansible_distribution_major_version == '8'

    - name: 13. Disable setup link rules
      ansible.builtin.file:
        src: /dev/null
        dest: /etc/udev/rules.d/80-net-setup-link.rules
        state: link
        force: true
      when: ansible_distribution_major_version == '8'

    - name: 14. Force reboot to apply the new kernel
      ansible.builtin.reboot:
        reboot_timeout: 300
      when: ansible_distribution_major_version == '8'

    - name: 15. Pre-confirm the VDO check required by Leapp
      ansible.builtin.command: leapp answer --section check_vdo.confirm=True
      environment:
        PATH: "/usr/sbin:/sbin:{{ ansible_env.PATH | default('/usr/bin:/bin') }}"
      when: ansible_distribution_major_version == '8'

    - name: 16. Run Leapp pre-upgrade analysis
      ansible.builtin.command: leapp preupgrade --no-rhsm
      register: preupgrade_result
      environment:
        PATH: "/usr/sbin:/sbin:{{ ansible_env.PATH | default('/usr/bin:/bin') }}"
      failed_when: false
      when: ansible_distribution_major_version == '8'

    - name: 17. Check if pre-upgrade failed due to critical inhibitors
      ansible.builtin.fail:
        msg: >
          Leapp pre-upgrade failed.
          Error Message: {{ preupgrade_result.msg | default('None') }}.
          Review /var/log/leapp/leapp-report.txt on the remote host.
      when:
        - ansible_distribution_major_version == '8'
        - preupgrade_result.rc is defined and preupgrade_result.rc != 0
        - >
          'inhibitor' in (preupgrade_result.stdout | default('')) or
          'inhibitor' in (preupgrade_result.stderr | default('')) or
          preupgrade_result.rc == 127

    - name: 18. Execute the actual OS upgrade process
      ansible.builtin.command: leapp upgrade
      register: upgrade_result
      async: 1800            # Allow the task to run in the background for up to 30 minutes
      poll: 10               # Check the status every 10 seconds
      environment:
        PATH: "/usr/sbin:/sbin:{{ ansible_env.PATH | default('/usr/bin:/bin') }}"
      when: ansible_distribution_major_version == '8'

    - name: 19. Trigger the ELevate migration reboot
      ansible.builtin.reboot:
        reboot_timeout: 2700
      when: ansible_distribution_major_version == '8'

    - name: 20. Post-Upgrade System Validation
      block:
        - name: 20a Force Ansible to refresh system information
          ansible.builtin.setup:

        - name: 20b Validate that the system has successfully upgraded to major version 9
          ansible.builtin.assert:
            that:
              - ansible_distribution == "AlmaLinux"
              - ansible_distribution_major_version == "9"
            fail_msg: "Upgrade validation failed! System is reporting version {{ ansible_distribution_version }} instead of AlmaLinux 9."
            success_msg: "Success! Verified target machine is now actively running {{ ansible_distribution_version }}."
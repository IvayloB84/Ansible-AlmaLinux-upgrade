name: Ansible Syntax Verification Check

on: [push, pull_request]

jobs:
  validate-playbook:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Pull down the updated code from the repository
        uses: actions/checkout@v4

      - name: 2. Set up the Python background ecosystem
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 3. Install the core Ansible engine
        run: |
          pip install --upgrade pip
          pip install ansible

      - name: 4. Perform a dry-run syntax verification check
        run: |
          ansible-playbook playbook_RH_migration_9_10.yml --syntax-check

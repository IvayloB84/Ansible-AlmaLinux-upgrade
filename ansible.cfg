[defaults]
interpreter_python = auto_silent
ansible_python_interpreter=/usr/bin/python3.12

# Use the native ansible.builtin.default plugin and set its format parameter to yaml
stdout_callback = default
bin_ansible_callbacks = True

[callback_default]
# Modern, non-deprecated way to enforce beautiful multi-line YAML error outputs
result_format = yaml

[ssh_connection]
# 2. PERMANENT FIX: Force all SSH connections to ignore the corrupted known_hosts file
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null